name: Keep Supabase Alive

# Пингует базу раз в 3 дня, чтобы бесплатный проект Supabase не встал на паузу
# (free-проект засыпает после ~7 дней без активности).

on:
  schedule:
    - cron: '17 6 */3 * *'   # каждые 3 дня в 06:17 UTC
  workflow_dispatch:          # ручной запуск кнопкой в Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Secrets SUPABASE_URL / SUPABASE_ANON_KEY не заданы"; exit 1
          fi
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/states?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "HTTP $code"
          # 200 или 401/403 (RLS без сессии) всё равно означают, что проект жив
          if [ "$code" = "000" ]; then echo "Нет ответа от Supabase"; exit 1; fi
          echo "Проект активен."
