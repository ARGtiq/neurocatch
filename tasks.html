      svg.setAttribute('stroke-linecap','round');svg.setAttribute('stroke-linejoin','round');

<body>
<div class="bgfx" id="bgfx"></div>
<div class="ambient"><span></span><span></span><span></span><span></span></div>
<div class="app">
<div class="topbar">
      <div class="grp">
        <span id="syncDot" class="sync-dot" title="Синхронизация" hidden></span>
      </div>
      <div class="grp">
        <button class="icon-btn" id="themeBtn" aria-label="Тема"><i data-lucide="moon"></i></button>
      </div>
    </div>

<section class="view" id="view-tasks">
      <div class="head-row"><h2>Задачи</h2></div>
      <div class="subtabs">
        <button class="subtab active" data-st="tasks">Задачи</button>
        <button class="subtab" data-st="habits">Привычки</button>
        <button class="subtab" data-st="matrix">Матрица</button>
      </div>
      <div class="st-panel" data-st="tasks">
        <div class="task-cal" id="taskCal"></div>
        <div class="list-head"><span id="tasksLabel">Открыто: 0</span><div class="sec-actions"><button class="mini" id="allTasksMd" title="Скачать все задачи .md"><i data-lucide="file-down"></i></button><button class="mini" id="allTasksTick" title="Копировать для TickTick"><i data-lucide="clipboard"></i></button></div></div>
        <div class="rep-list" id="taskList"></div>
        <div id="doneWrap"></div>
      </div>
      <div class="st-panel" data-st="habits" hidden>
        <div class="bm-add"><input type="text" id="habitName" placeholder="Новая привычка (напр. Зарядка)…" autocomplete="off"><button class="btn" id="habitAdd" aria-label="Добавить"><i data-lucide="plus"></i></button></div>
        <div id="habitList"></div>
      </div>
      <div class="st-panel" data-st="matrix" hidden>
        <div class="matrix-hint">Разложи открытые задачи по важности и срочности. Нераспределённые — в полосе сверху.</div>
        <div id="matrixUnsorted" class="matrix-unsorted"></div>
        <div id="matrixWrap" class="matrix-grid"></div>
      </div>
    </section>
</div>

<div class="overlay" id="errOverlay">
  <div class="modal" role="dialog" aria-modal="true" style="max-width:440px">
    <div class="modal-head"><h2><i data-lucide="alert-triangle"></i>Что-то пошло не так</h2><button class="icon-btn" id="errClose" aria-label="Закрыть"><i data-lucide="x"></i></button></div>
    <p style="color:var(--muted);margin-bottom:10px">Произошла ошибка. Данные не потеряны.</p>
    <div class="err-msg" id="errMsg"></div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn" id="errCopy" style="flex:1"><i data-lucide="clipboard"></i>Скопировать</button>
      <button class="btn btn-primary" id="errReport" style="flex:1"><i data-lucide="bug"></i>Баг-репорт</button>
    </div>
    <button class="btn" id="errDismiss" style="width:100%;margin-top:10px">Закрыть</button>
  </div>
</div>

<div class="overlay" id="bugOverlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head"><h2><i data-lucide="bug"></i>Баг-репорт</h2><button class="icon-btn" id="bugClose" aria-label="Закрыть"><i data-lucide="x"></i></button></div>
    <textarea id="bugNote" placeholder="Что пошло не так? (необязательно)" style="min-height:70px"></textarea>
    <textarea id="bugData" readonly style="min-height:180px;margin-top:10px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px"></textarea>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button class="btn" id="bugCopy" style="flex:1"><i data-lucide="clipboard"></i>Скопировать</button>
      <button class="btn" id="bugDownload" style="flex:1"><i data-lucide="download"></i>Скачать</button>
    </div>
  </div>
</div>
<button class="bug-fab" id="bugBtn" title="Сообщить о баге"><i data-lucide="bug"></i></button>

  function createIcons(){
    document.querySelectorAll('[data-lucide]').forEach(el=>{
      const b=P[el.getAttribute('data-lucide')]; if(!b) return;
      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('viewBox','0 0 24 24');svg.setAttribute('fill','none');
      svg.setAttribute('stroke','currentColor');svg.setAttribute('stroke-width','2');
      svg.setAttribute('stroke-linecap','round');svg.setAttribute('stroke-linejoin','round');
      const st=el.getAttribute('style'); if(st)svg.setAttribute('style',st);
      const cl=el.getAttribute('class'); if(cl)svg.setAttribute('class',cl);
      svg.innerHTML=b; el.replaceWith(svg);
    });
  }
  window.lucide={createIcons};
